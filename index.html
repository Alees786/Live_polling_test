<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Live Polling</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0e1a}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.root{background:#0a0e1a;height:100vh;height:100dvh;padding:10px;display:flex;flex-direction:column;gap:8px}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;flex-shrink:0;padding:0 4px;gap:8px}
.header-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.title{color:#e8ecf4;font-size:18px;font-weight:600;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.election-label{color:#7a9bbf;font-size:12px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.live-badge{background:#c0392b;color:#fff;font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;display:flex;align-items:center;gap:6px;letter-spacing:.04em;white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.fs-btn{background:#1a2235;border:1px solid #2a3a55;color:#7a9bbf;width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.fs-btn:hover{background:#1f2d45;color:#c8d8f0}

/* Aggregation bar */
.agg-bar{flex-shrink:0;background:#111827;border:1.5px solid #1e2a40;border-radius:8px;padding:8px 16px;display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.agg-bar.hidden{display:none}
.agg-stats-row{display:flex;flex:1;min-width:0}
.agg-stat{flex:1;text-align:center;border-right:1px solid #1e2a40;padding:0 8px}
.agg-stat:last-child{border-right:none}
.agg-val{color:#f4d35e;font-size:20px;font-weight:700;line-height:1}
.agg-lbl{color:#5a7090;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-top:3px}
.agg-progress-wrap{flex:2;padding:0 16px;min-width:120px}
.agg-pct{color:#e8ecf4;font-size:11px;font-weight:600}
.agg-track{background:#1e2a40;border-radius:99px;height:8px;overflow:hidden;margin-top:4px}
.agg-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#27ae60,#2ecc71);transition:width .6s ease}

/* Ticker */
.ticker-wrap{flex-shrink:0;overflow:hidden;border-radius:8px;padding:7px 0;position:relative;display:none}
.ticker-wrap.show{display:block}
.ticker-wrap.cat-normal{background:#0d1f10;border:1.5px solid #1a3a20}
.ticker-wrap.cat-urgent{background:#200e0e;border:1.5px solid #4a1a1a}
.ticker-wrap.cat-closed{background:#1a1208;border:1.5px solid #3a2a10}
.ticker-wrap.cat-alees{background:#1a0828;border:1.5px solid #4a1060}
.ticker-badge{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:20px;z-index:2;white-space:nowrap}
.cat-normal .ticker-badge{background:#1a3a20;color:#4ade80}
.cat-urgent .ticker-badge{background:#4a1a1a;color:#f87171}
.cat-closed .ticker-badge{background:#3a2a10;color:#fbbf24}
.cat-alees  .ticker-badge{background:#4a1060;color:#ff0066}
.ticker-track{display:flex;white-space:nowrap;width:max-content;will-change:transform;animation:ticker-scroll linear infinite;padding-left:90px}
.ticker-item{padding-right:80px;font-size:13px;font-weight:600;letter-spacing:.02em}
.cat-normal .ticker-item{color:#4ade80}
.cat-urgent .ticker-item{color:#f87171}
.cat-closed .ticker-item{color:#26D3F6}
.cat-alees  .ticker-item{color:#ff0066}
@keyframes ticker-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* Grid */
.grid{display:grid;gap:10px;flex:1;min-height:0}

/* Booth (desktop — iframe mode) */
.booth{background:#111827;border-radius:8px;overflow:hidden;border:1.5px solid #1e2a40;border-top:3px solid transparent;display:flex;flex-direction:column;transition:opacity .4s}
.booth.offline{opacity:.5;filter:grayscale(.6)}
.booth-header{background:#1a2235;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.booth-left{display:flex;align-items:center;gap:8px;min-width:0}
.booth-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.booth-name{color:#94aacf;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.booth-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.booth-status{width:8px;height:8px;border-radius:50%;animation:blink 1.5s infinite}
.offline-tag{font-size:10px;color:#888;display:none}
.booth.offline .offline-tag{display:inline}
.booth.offline .booth-status{animation:none;background:#555!important}

/* iframe area */
.frame-wrap{flex:1;min-height:0;position:relative;overflow:hidden}
.frame-wrap iframe{width:100%;height:100%;border:none;display:block;background:#0a0e1a;transform-origin:top left;}
.no-url{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#3d5070}
.no-url i{font-size:32px}
.no-url p{font-size:13px}

/* ── DONUT CARD (mobile booth body) ── */
.donut-card{display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 14px;gap:10px;background:#0d1424;flex:1;min-height:0}
.donut-row{display:flex;align-items:center;gap:14px;width:100%}
.donut-svg-wrap{position:relative;flex-shrink:0}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;line-height:1}
.donut-pct{font-size:15px;font-weight:700;color:#f4d35e}
.donut-sub{font-size:9px;color:#5a7090;text-transform:uppercase;letter-spacing:.05em}
.donut-stats{flex:1;display:flex;flex-direction:column;gap:6px}
.d-stat{display:flex;align-items:center;gap:7px}
.d-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-label{color:#7a9bbf;font-size:11px;flex:1}
.d-val{font-size:13px;font-weight:700;color:#e8ecf4}
.donut-bar-row{width:100%}
.donut-bar-track{background:#1e2a40;border-radius:99px;height:5px;overflow:hidden;margin-top:3px}
.donut-bar-fill{height:100%;border-radius:99px;transition:width .8s ease}
.booth-status-row{display:flex;align-items:center;gap:6px}
.booth-status-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.04em}

/* ── MOBILE ── */
@media(max-width:600px){
  .root{padding:6px;gap:5px}
  .header{align-items:flex-start}
  .header-left{flex-direction:column;gap:2px;align-items:flex-start}
  .title{font-size:14px;letter-spacing:0}
  .election-label{font-size:11px}
  .live-badge{font-size:10px;padding:3px 8px}
  .dot{width:6px;height:6px}
  .fs-btn{width:28px;height:28px;font-size:13px}

  .agg-bar{flex-direction:column;padding:7px 10px;gap:6px}
  .agg-stats-row{width:100%}
  .agg-stat{padding:0 5px}
  .agg-val{font-size:15px}
  .agg-lbl{font-size:9px}
  .agg-progress-wrap{width:100%;padding:0;min-width:unset}
  .agg-track{height:6px}

  .ticker-item{font-size:12px;padding-right:60px}
  .ticker-badge{font-size:9px;padding:2px 6px}
  .ticker-track{padding-left:75px}

  .grid{gap:6px}
  .booth-name{font-size:12px}
  .booth-header{padding:5px 9px}
  .booth-dot{width:8px;height:8px}
  .booth-status{width:7px;height:7px}

  /* On mobile: hide iframe, show donut card */
  .frame-wrap{display:none}
  .donut-card{display:flex}
}
</style>
</head>
<body>
<div class="root">

  <div class="header">
    <div class="header-left">
      <span class="title" id="electionTitle">Election Live Polling</span>
      <span class="election-label" id="electionSub"></span>
    </div>
    <div class="header-right">
      <button class="fs-btn" id="fsBtn" title="Fullscreen"><i class="ti ti-maximize" id="fsIcon"></i></button>
      <span class="live-badge"><span class="dot"></span>LIVE</span>
    </div>
  </div>

  <div class="agg-bar hidden" id="aggBar">
    <div class="agg-stats-row">
      <div class="agg-stat"><div class="agg-val" id="aggPolled">—</div><div class="agg-lbl">Votes Cast</div></div>
      <div class="agg-stat"><div class="agg-val" id="aggRemaining">—</div><div class="agg-lbl">Yet to Vote</div></div>
      <div class="agg-stat"><div class="agg-val" id="aggTotal">—</div><div class="agg-lbl">Total Students</div></div>
    </div>
    <div class="agg-progress-wrap">
      <div class="agg-pct" id="aggPct">0% Polled</div>
      <div class="agg-track"><div class="agg-fill" id="aggFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="ticker-wrap cat-normal" id="tickerWrap">
    <span class="ticker-badge" id="tickerBadge">INFO</span>
    <div class="ticker-track" id="tickerTrack">
      <span class="ticker-item" id="tickerA"></span>
      <span class="ticker-item" id="tickerB"></span>
    </div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>
/* ╔══════════════════════════════════════════════════════════╗
   ║              ★  CONFIGURATION — EDIT HERE  ★            ║
   ╚══════════════════════════════════════════════════════════╝ */
var CONFIG = {

  title: "Election Live Polling",
  subtitle: "Nusrath School · Student Parliament 2026–27",

  booths: [
    {
      name: "Booth 1",
      url:  "https://script.google.com/macros/s/AKfycby_I7JIfaoIUpuyHBfCn-Sar0SK0nKBH65JCc4i2Qc7H8wwohusbtUenW3AwjYuqbk6/exec?page=polling"
    },
    {
      name: "Booth 2",
      url:  "https://script.google.com/macros/s/AKfycbyViynneHWRuBHKmXNPPs7C5MRarBhZRRkzHh7pp9sNXUT9WQGAVdHljIfj13euCXV6/exec?page=polling"
    },
    {
      name: "Booth 3",
      url:  "https://script.google.com/macros/s/AKfycbyViynneHWRuBHKmXNPPs7C5MRarBhZRRkzHh7pp9sNXUT9WQGAVdHljIfj13euCXV6/exec?page=polling"
    }
  ],

  apiUrl: "https://script.google.com/macros/s/AKfycbwKuQNcvjMq366W320HdW1vRrgTJhn_HAZREPOEucrRpruSQh4Ke1IsxLmZFSduS0pP/exec",
  pollInterval: 15,
  autoRefreshMinutes: 3

};
/* ╔══════════════════════════════════════════════════════════╗
   ║            END OF CONFIGURATION — DO NOT EDIT BELOW     ║
   ╚══════════════════════════════════════════════════════════╝ */

var COLORS = ["#27ae60","#e67e22","#3498db","#e74c3c","#9b59b6",
              "#1abc9c","#f1c40f","#e84393","#2ecc71","#5d8aa8"];
var CAT_LABELS = { normal:"INFO", urgent:"⚡ URGENT", closed:"CLOSED", alees:"★ LATEST" };

/* Per-booth data store: { polled, total, status, name } */
var boothData = [];

document.getElementById("electionTitle").textContent = CONFIG.title;
document.getElementById("electionSub").textContent   = CONFIG.subtitle;
document.title = CONFIG.title;

/* ── Fullscreen ── */
document.getElementById("fsBtn").addEventListener("click", function(){
  if (!document.fullscreenElement)
    document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
  else
    document.exitFullscreen && document.exitFullscreen();
});
document.addEventListener("fullscreenchange", function(){
  document.getElementById("fsIcon").className =
    document.fullscreenElement ? "ti ti-minimize" : "ti ti-maximize";
});

/* ── SVG donut helper ── */
function makeDonut(polled, total, color, size) {
  size = size || 72;
  var r    = (size - 10) / 2;
  var cx   = size / 2, cy = size / 2;
  var circ = 2 * Math.PI * r;
  var pct  = total > 0 ? polled / total : 0;
  var dash = pct * circ;
  var gap  = circ - dash;

  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="#1e2a40" stroke-width="9"/>' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none"' +
      ' stroke="' + color + '" stroke-width="9"' +
      ' stroke-dasharray="' + dash.toFixed(2) + ' ' + gap.toFixed(2) + '"' +
      ' stroke-linecap="round"' +
      ' transform="rotate(-90 ' + cx + ' ' + cy + ')"' +
      ' style="transition:stroke-dasharray .8s ease"/>' +
  '</svg>';
}

/* ── Render donut card ── */
function renderDonutCard(card, idx) {
  var color    = COLORS[idx % COLORS.length];
  var data     = boothData[idx] || { polled: 0, total: 0, status: "live" };
  var polled   = data.polled || 0;
  var total    = data.total  || 0;
  var remain   = Math.max(0, total - polled);
  var pct      = total > 0 ? Math.round(polled / total * 100) : 0;
  var isClosed = data.status === "closed";

  var statusBg   = isClosed ? "#3a1a1a" : "#0d2a14";
  var statusCol  = isClosed ? "#f87171" : "#4ade80";
  var statusText = isClosed ? "CLOSED"  : "OPEN";

  card.innerHTML =
    /* Donut + stats row */
    '<div class="donut-row">' +
      '<div class="donut-svg-wrap">' +
        makeDonut(polled, total, color, 80) +
        '<div class="donut-center">' +
          '<div class="donut-pct">' + pct + '%</div>' +
          '<div class="donut-sub">polled</div>' +
        '</div>' +
      '</div>' +
      '<div class="donut-stats">' +
        '<div class="d-stat"><span class="d-dot" style="background:' + color + '"></span>' +
          '<span class="d-label">Voted</span><span class="d-val">' + polled + '</span></div>' +
        '<div class="d-stat"><span class="d-dot" style="background:#1e2a40;border:1px solid #3a5070"></span>' +
          '<span class="d-label">Remaining</span><span class="d-val">' + remain + '</span></div>' +
        '<div class="d-stat"><span class="d-dot" style="background:#f4d35e"></span>' +
          '<span class="d-label">Total</span><span class="d-val">' + total + '</span></div>' +
        '<div class="booth-status-row">' +
          '<span class="booth-status-pill" style="background:' + statusBg + ';color:' + statusCol + '">' + statusText + '</span>' +
        '</div>' +
      '</div>' +
    '</div>' +
    /* Thin progress bar */
    '<div class="donut-bar-row">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:2px">' +
        '<span style="color:#5a7090;font-size:10px">Progress</span>' +
        '<span style="color:#94aacf;font-size:10px">' + pct + '%</span>' +
      '</div>' +
      '<div class="donut-bar-track"><div class="donut-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
    '</div>';
}

/* ── Grid ── */
function isMobile() { return window.innerWidth <= 600; }

function gridDimensions(n) {
  if (isMobile()) return { cols: 1, rows: n };
  if (n <= 3) return { cols: n, rows: 1 };
  var cols = Math.ceil(Math.sqrt(n));
  return { cols: cols, rows: Math.ceil(n / cols) };
}

var refreshTimers = [];

function buildGrid() {
  refreshTimers.forEach(clearInterval);
  refreshTimers = [];

  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  var n   = CONFIG.booths.length;
  var dim = gridDimensions(n);
  grid.style.gridTemplateColumns = "repeat(" + dim.cols + ", 1fr)";
  grid.style.gridTemplateRows    = "repeat(" + dim.rows + ", 1fr)";

  CONFIG.booths.forEach(function(booth, i) {
    var color = COLORS[i % COLORS.length];
    var el    = document.createElement("div");
    el.className = "booth";
    el.style.borderTopColor = color;

    el.innerHTML =
      '<div class="booth-header">' +
        '<div class="booth-left">' +
          '<span class="booth-dot" style="background:' + color + '"></span>' +
          '<span class="booth-name">' + (booth.name || "Booth "+(i+1)) + '</span>' +
        '</div>' +
        '<div class="booth-right">' +
          '<span class="offline-tag">OFFLINE</span>' +
          '<span class="booth-status" style="background:' + color + '"></span>' +
        '</div>' +
      '</div>' +
      '<div class="frame-wrap">' +
        (booth.url
          ? '<iframe data-src="' + booth.url + '" title="' + booth.name + '" ' +
            'sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>'
          : '<div class="no-url"><i class="ti ti-layout-board"></i><p>No URL configured</p></div>') +
      '</div>' +
      '<div class="donut-card" id="donut-' + i + '"></div>';

    grid.appendChild(el);

    /* Render initial donut */
    renderDonutCard(el.querySelector("#donut-" + i), i);

    var iframe   = el.querySelector("iframe");
    var statusEl = el.querySelector(".booth-status");
    if (iframe) {
      iframe.src = iframe.dataset.src;
      armHeartbeat(iframe, el, statusEl);
      if (CONFIG.autoRefreshMinutes > 0) {
        var t = setInterval(function(iframe, el, statusEl) {
          return function() {
            el.classList.add("offline");
            statusEl.style.animation = "none";
            iframe.src = iframe.dataset.src +
              (iframe.dataset.src.indexOf("?") > -1 ? "&" : "?") + "_r=" + Date.now();
            armHeartbeat(iframe, el, statusEl);
          };
        }(iframe, el, statusEl), CONFIG.autoRefreshMinutes * 60000);
        refreshTimers.push(t);
      }
    }
  });
}

function armHeartbeat(iframe, boothEl, statusEl) {
  var timer = setTimeout(function() {
    boothEl.classList.add("offline");
    statusEl.style.animation = "none";
  }, 12000);
  iframe.addEventListener("load", function onLoad() {
    clearTimeout(timer);
    boothEl.classList.remove("offline");
    statusEl.style.animation = "";
    iframe.removeEventListener("load", onLoad);
  });
}

/* ── Ticker ── */
function showTicker(msg, cat, speed) {
  cat = cat || "normal"; speed = speed || "normal";
  var wrap  = document.getElementById("tickerWrap");
  var track = document.getElementById("tickerTrack");
  var badge = document.getElementById("tickerBadge");
  if (!msg || !msg.trim()) { wrap.classList.remove("show"); return; }
  document.getElementById("tickerA").textContent = msg;
  document.getElementById("tickerB").textContent = msg;
  badge.textContent = CAT_LABELS[cat] || "INFO";
  wrap.className = "ticker-wrap show cat-" + cat;
  var speedMap = { slow:.38, normal:.22, fast:.12 };
  var secs = Math.max(8, msg.length * (speedMap[speed] || .22));
  track.style.animation = "ticker-scroll " + secs + "s linear infinite";
}

/* ── API polling ── */
function pollApi() {
  if (!CONFIG.apiUrl) return;
  var base = CONFIG.apiUrl;
  var sep  = base.indexOf("?") > -1 ? "&" : "?";
  var t    = Date.now();

  /* Ticker */
  fetch(base + sep + "action=get&t=" + t, { cache:"no-store" })
    .then(function(r){ return r.json(); })
    .then(function(d){
      var msg = d.message || "", cat = d.category || "normal";
      if (Array.isArray(d.scheduled)) {
        var now  = new Date();
        var hhmm = now.getHours().toString().padStart(2,"0") + ":" +
                   now.getMinutes().toString().padStart(2,"0");
        var hit  = d.scheduled.find(function(s){ return s.at === hhmm; });
        if (hit) { msg = hit.message || msg; cat = hit.category || cat; }
      }
      showTicker(msg, cat);
    }).catch(function(){});

  /* Aggregation totals (driven from booth data now; kept for display) */
  fetch(base + sep + "action=totals&t=" + t, { cache:"no-store" })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (typeof d.polled !== "number" || typeof d.total !== "number") return;
      var pct = d.total > 0 ? Math.round(d.polled / d.total * 100) : 0;
      document.getElementById("aggPolled").textContent    = d.polled;
      document.getElementById("aggRemaining").textContent = Math.max(0, d.total - d.polled);
      document.getElementById("aggTotal").textContent     = d.total;
      document.getElementById("aggPct").textContent       = pct + "% Polled";
      document.getElementById("aggFill").style.width      = pct + "%";
      document.getElementById("aggBar").classList.remove("hidden");
    }).catch(function(){});

  /* ── Per-booth totals — independent donut data from remote control ── */
  fetch(base + sep + "action=booth_totals&t=" + t, { cache:"no-store" })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (!Array.isArray(d) || d.length === 0) return;
      /* Update each booth donut independently with its own remote-control values */
      d.forEach(function(item, i) {
        boothData[i] = item;
        var card = document.getElementById("donut-" + i);
        if (card) renderDonutCard(card, i);
      });
    }).catch(function(){
      /* If booth_totals not available, leave existing boothData alone */
    });
}

/* ── Boot ── */
buildGrid();
window.addEventListener("resize", function(){
  clearTimeout(window._rt);
  window._rt = setTimeout(buildGrid, 200);
});
if (CONFIG.apiUrl) {
  pollApi();
  setInterval(pollApi, CONFIG.pollInterval * 1000);
}
</script>
</body>
</html>
